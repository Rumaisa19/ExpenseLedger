name: expense_ledger_app
description: "A professional offline-first expense tracker built with Flutter, Hive, and Provider."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Persistence (Everything is now handled by Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # File Operations (Required by Hive and for Exports)
  path_provider: ^2.1.1
  
  # Sharing
  share_plus: ^7.2.1
  
  # URL Launcher
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation for Hive Models (Expense, etc.)
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true